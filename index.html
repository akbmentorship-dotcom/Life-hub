<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Align">
<meta name="theme-color" content="#080808">
<title>Align Living</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overscroll-behavior:none}
body{height:100dvh;background:#080808;color:#e8e4dc;font-family:'DM Mono',monospace;-webkit-font-smoothing:antialiased;overflow:hidden;overscroll-behavior:none}
button,input,textarea,select{font-family:'DM Mono',monospace}
:root{
  --bg:#080808;--s1:#0f0f0f;--s2:#141414;--s3:#1a1a1a;
  --b1:#1e1e1e;--b2:#282828;--b3:#333;
  --tx:#e8e4dc;--t2:#999;--t3:#555;
  --or:#f26419;--od:rgba(242,100,25,0.12);--ob:rgba(242,100,25,0.3);
  --bl:#4a9eff;--bd:rgba(74,158,255,0.1);--bb:rgba(74,158,255,0.3);
  --gr:#3ddc84;--gd:rgba(61,220,132,0.1);--gb:rgba(61,220,132,0.3);
  --pu:#b06eff;--pd:rgba(176,110,255,0.1);--pb:rgba(176,110,255,0.3);
  --ye:#f5c842;--yd:rgba(245,200,66,0.1);--yb:rgba(245,200,66,0.3);
  --re:#ff4d4d;--rd:rgba(255,77,77,0.1);--rb:rgba(255,77,77,0.3);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --nav:60px;
}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;position:relative}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(–nav) + var(–sb) + 16px)}
#screen::-webkit-scrollbar{display:none}

/* ── NAV ── */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(–nav) + var(–sb));padding-bottom:var(–sb);background:rgba(8,8,8,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(–b1);display:flex;align-items:flex-start;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:10px;gap:4px;border:none;background:none;color:var(–t3);cursor:pointer;transition:color 0.15s}
.nav-btn.active{color:var(–or)}
.nav-icon{font-size:20px;line-height:1}
.nav-lbl{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500}

/* ── PAGE HEADER ── */
.pg-head{padding:calc(var(–st) + 20px) 20px 16px;flex-shrink:0}
.pg-title{font-family:‘Syne’,sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.02em}
.pg-sub{font-size:10px;color:var(–t2);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px}

/* ── SECTION ── */
.sec{padding:0 16px 8px}
.sec-lbl{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(–t3);padding:16px 0 8px}

/* ── CARD ── */
.card{background:var(–s1);border:1px solid var(–b1);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-title{font-size:13px;font-weight:500}
.card-sub{font-size:11px;color:var(–t2);margin-top:2px}

/* ── PILL BADGE ── */
.pill{display:inline-block;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:20px;font-weight:500}
.pill-or{background:var(–od);color:var(–or);border:1px solid var(–ob)}
.pill-bl{background:var(–bd);color:var(–bl);border:1px solid var(–bb)}
.pill-gr{background:var(–gd);color:var(–gr);border:1px solid var(–gb)}
.pill-pu{background:var(–pd);color:var(–pu);border:1px solid var(–pb)}
.pill-ye{background:var(–yd);color:var(–ye);border:1px solid var(–yb)}
.pill-re{background:var(–rd);color:var(–re);border:1px solid var(–rb)}
.pill-gray{background:var(–s2);color:var(–t2);border:1px solid var(–b2)}

/* ── BUTTON ── */
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;padding:8px 14px;transition:opacity 0.15s}
.btn:active{opacity:0.7}
.btn-or{background:var(–or);color:#fff}
.btn-ghost{background:var(–s2);color:var(–t2);border:1px solid var(–b2)}
.btn-full{width:100%}
.btn-sm{padding:5px 10px;font-size:11px}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(–nav) + var(–sb) + 16px);right:20px;width:48px;height:48px;border-radius:50%;background:var(–or);color:#fff;font-size:22px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(242,100,25,0.4);z-index:99;transition:transform 0.15s}
.fab:active{transform:scale(0.93)}

/* ── INPUT ── */
.inp{width:100%;background:var(–s2);border:1px solid var(–b2);border-radius:8px;padding:10px 12px;color:var(–tx);font-size:13px;outline:none;transition:border-color 0.15s}
.inp:focus{border-color:var(–or)}
.inp::placeholder{color:var(–t3)}
textarea.inp{resize:none;min-height:70px;line-height:1.5}
select.inp{cursor:pointer;-webkit-appearance:none}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(–t2);margin-bottom:6px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.modal-bg.hidden{display:none}
.modal{background:var(–s1);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(–sb));width:100%;max-width:480px;margin:0 auto;max-height:88dvh;overflow-y:auto}
.modal::-webkit-scrollbar{display:none}
.modal-handle{width:36px;height:4px;background:var(–b3);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:‘Syne’,sans-serif;font-size:18px;font-weight:800;margin-bottom:18px}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat-card{background:var(–s1);border:1px solid var(–b1);border-radius:12px;padding:14px;position:relative}
.stat-val{font-family:‘Syne’,sans-serif;font-size:28px;font-weight:800;line-height:1}
.stat-lbl{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(–t2);margin-top:4px}
.stat-ctrls{display:flex;gap:6px;margin-top:10px}
.stat-btn{flex:1;height:28px;border-radius:6px;border:1px solid var(–b2);background:var(–s2);color:var(–t2);font-size:16px;cursor:pointer}
.stat-btn:active{background:var(–b2)}

/* ── HABIT DOTS ── */
.habit-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(–b1)}
.habit-row:last-child{border-bottom:none}
.habit-name{font-size:12px}
.habit-days{display:flex;gap:4px}
.hday{width:22px;height:22px;border-radius:6px;background:var(–s2);border:1px solid var(–b1);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(–t3);cursor:pointer;transition:all 0.15s}
.hday.done{background:var(–gd);border-color:var(–gb);color:var(–gr)}
.hday.today{border-color:var(–or)}

/* ── STREAK BADGE ── */
.streak-badge{display:flex;align-items:center;gap:6px;background:var(–od);border:1px solid var(–ob);border-radius:10px;padding:8px 12px}
.streak-num{font-family:‘Syne’,sans-serif;font-size:22px;font-weight:800;color:var(–or)}
.streak-txt{font-size:10px;color:var(–t2);letter-spacing:0.08em;text-transform:uppercase}

/* ── PROGRESS BAR ── */
.prog-wrap{background:var(–s2);border-radius:4px;height:4px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:4px;transition:width 0.4s}

/* ── PIPELINE STAGE DOTS ── */
.stage-q{color:#f5c842}.stage-c{color:#3ddc84}.stage-x{color:#ff4d4d}

/* ── WORKOUT ── */
.day-tabs{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(–b2);background:var(–s2);color:var(–t2);font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.day-tab.active{background:var(–or);border-color:var(–or);color:#fff}
.exercise-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(–b1)}
.exercise-row:last-child{border-bottom:none}
.ex-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(–b3);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.ex-check.done{background:var(–gr);border-color:var(–gr)}
.ex-name{font-size:12px;flex:1}
.ex-sets{font-size:10px;color:var(–t2);text-align:right;flex-shrink:0}

/* ── LOG HISTORY ── */
.log-entry{background:var(–s1);border:1px solid var(–b1);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.log-date{font-size:10px;color:var(–t2);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px}
.log-text{font-size:12px;line-height:1.6;color:var(–tx)}

/* ── CONTENT ── */
.pillar-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:10px;border:1px solid var(–b2);background:var(–s2);color:var(–t2);cursor:pointer;transition:all 0.15s;margin:3px}
.pillar-chip.active-faith{background:var(–pd);border-color:var(–pb);color:var(–pu)}
.pillar-chip.active-fitness{background:var(–gd);border-color:var(–gb);color:var(–gr)}
.pillar-chip.active-parenting{background:var(–bd);border-color:var(–bb);color:var(–bl)}
.pillar-chip.active-marriage{background:var(–rd);border-color:var(–rb);color:var(–re)}
.pillar-chip.active-entrepreneurship{background:var(–od);border-color:var(–ob);color:var(–or)}

/* ── REMINDER BADGE ── */
.reminder-dot{width:6px;height:6px;border-radius:50%;background:var(–ye);flex-shrink:0}

/* ── DIVIDER ── */
.divider{height:1px;background:var(–b1);margin:4px 0}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(–t3);font-size:12px}
.empty-icon{font-size:32px;margin-bottom:12px}

/* ── TODO ── */
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(–b1)}
.todo-item:last-child{border-bottom:none}
.todo-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(–b3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all 0.15s}
.todo-check.done{background:var(–gr);border-color:var(–gr)}
.todo-text{font-size:12px;flex:1;line-height:1.5}
.todo-text.done{text-decoration:line-through;color:var(–t3)}
.todo-meta{font-size:10px;color:var(–t3);margin-top:2px}
.todo-del{background:none;border:none;color:var(–t3);font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0}

/* ── TABS ── */
.tab-bar{display:flex;gap:4px;padding:0 16px 12px;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(–b2);background:var(–s2);color:var(–t2);font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.tab-btn.active{background:var(–s3);border-color:var(–b3);color:var(–tx)}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn 0.2s ease both}

/* ── CONTACT CARD ── */
.contact-card{background:var(–s1);border:1px solid var(–b1);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.contact-card:active{border-color:var(–b3)}
.contact-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.contact-name{font-size:13px;font-weight:500}
.contact-note{font-size:11px;color:var(–t2);line-height:1.5;margin-top:4px}
.contact-footer{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}

/* ── WEEK DOTS ── */
.week-dots{display:flex;gap:5px;margin-bottom:16px}
.wdot{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.wdot-lbl{font-size:8px;color:var(–t3);text-transform:uppercase;letter-spacing:0.08em}
.wdot-circle{width:100%;aspect-ratio:1;border-radius:50%;background:var(–s2);border:1.5px solid transparent;display:flex;align-items:center;justify-content:center;font-family:‘Syne’,sans-serif;font-size:9px;font-weight:800}
.wdot-circle.filled{background:var(–od);border-color:var(–ob);color:var(–or)}
.wdot-circle.today-dot{border-color:var(–or)}
</style>

</head>

    <button class="nav-btn" data-page="family" onclick="goPage('family')">

      <span class="nav-lbl">Family</span>
    </button>

      <span class="nav-icon">◆</span>
      <span class="nav-lbl">Biz</span>

<!-- MODALS -->

<div id="modal-bg" class="modal-bg hidden" onclick="closeModal(event)">
  <div class="modal" id="modal-inner" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════
const DB = {
  get(k, def = null) {
    try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch { return def; }
  },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  push(k, item) { const a = DB.get(k, []); a.push(item); DB.set(k, a); return a; },
  update(k, id, patch) {
    const a = DB.get(k, []); const i = a.findIndex(x => x.id === id);
    if (i >= 0) { a[i] = { ...a[i], ...patch }; DB.set(k, a); } return a;
  },
  remove(k, id) { const a = DB.get(k, []).filter(x => x.id !== id); DB.set(k, a); return a; }
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function today() { return new Date().toISOString().split(‘T’)[0]; }
function fmtDate(d) {
if (!d) return ‘’;
const dt = new Date(d + ‘T00:00:00’);
return dt.toLocaleDateString(‘en-CA’, { month: ‘short’, day: ‘numeric’, year: ‘numeric’ });
}
function fmtDateTime(ts) {
if (!ts) return ‘’;
return new Date(ts).toLocaleString(‘en-CA’, { month: ‘short’, day: ‘numeric’, hour: ‘numeric’, minute: ‘2-digit’ });
}
function weekDays() {
const d = new Date(); d.setHours(0,0,0,0);
const dow = (d.getDay() + 6) % 7; // Mon=0
const mon = new Date(d); mon.setDate(d.getDate() - dow);
return Array.from({ length: 7 }, (_, i) => {
const dd = new Date(mon); dd.setDate(mon.getDate() + i);
return dd.toISOString().split(‘T’)[0];
});
}

// ═══════════════════════════════════════════════════════
// REMINDER ENGINE — surfaces as home tasks
// ═══════════════════════════════════════════════════════
function getAllReminders() { return DB.get(‘reminders’, []); }
function addReminder(r) { DB.push(‘reminders’, { id: uid(), …r, created: Date.now() }); }
function deleteReminder(id) { DB.remove(‘reminders’, id); }
function dueReminders() {
const t = today();
return getAllReminders().filter(r => r.date <= t && !r.dismissed);
}
function dismissReminder(id) { DB.update(‘reminders’, id, { dismissed: true }); }

// ═══════════════════════════════════════════════════════
// WORKOUT DATA
// ═══════════════════════════════════════════════════════
const WORKOUTS = {

label: ‘Tue — Upper A’, tag: ‘Strength’,
warmup: [‘Band pull-aparts 2×15’, ‘Wall slides 2×10’, ‘Shoulder CARs 2×5 each’, ‘Dead hang 2×30s’, ‘Thoracic rotations 10 each’],
exercises: [

{ name: ‘Weighted Pull-up’, sets: ‘3×6’, note: ‘Add weight if needed’ },
{ name: ‘Incline DB Press’, sets: ‘3×10’ },
{ name: ‘Cable Row’, sets: ‘3×12’ },
{ name: ‘Tricep Dips’, sets: ‘3×10’ },
{ name: ‘DB Curl’, sets: ‘3×12’ },
]
},
thu: {
label: ‘Thu — Lower A’, tag: ‘Strength’,
warmup: [‘Hip circles 2×10 each’, ‘Glute bridges 2×15’, ‘Leg swings 2×10 each’, ‘Cossack squat 2×5 each’, ‘Hip flexor stretch 2×30s’],
exercises: [
{ name: ‘Back Squat’, sets: ‘4×5’, note: ‘Heavy — 3-4 RIR’ },
{ name: ‘Romanian Deadlift’, sets: ‘3×8’ },
{ name: ‘Leg Press’, sets: ‘3×10’ },
{ name: ‘Nordic Curl’, sets: ‘3×6’, note: ‘Use band assist if needed’ },
{ name: ‘Bulgarian Split Squat’, sets: ‘3×8 each’ },
{ name: ‘Calf Raise’, sets: ‘4×15’ },

]
},

label: ‘Sat — Upper B’, tag: ‘Hypertrophy’,
warmup: [‘Band pull-aparts 2×15’, ‘Wall slides 2×10’, ‘Shoulder CARs 2×5 each’, ‘Dead hang 2×30s’, ‘Thoracic rotations 10 each’],
exercises: [
{ name: ‘DB Bench Press’, sets: ‘4×10’ },
{ name: ‘Chest-Supported Row’, sets: ‘4×10’ },
{ name: ‘Lateral Raises’, sets: ‘4×15’ },
{ name: ‘Lat Pulldown’, sets: ‘4×10’ },
{ name: ‘Cable Fly’, sets: ‘3×15’ },
{ name: ‘Face Pulls’, sets: ‘3×15’ },
{ name: ‘Skull Crushers’, sets: ‘3×12’ },
{ name: ‘Hammer Curl’, sets: ‘3×12’ },
]
},
sun: {
label: ‘Sun — Lower B + Plyo’, tag: ‘Athletic’,
warmup: [‘Hip circles 2×10 each’, ‘Glute bridges 2×15’, ‘Leg swings 2×10 each’, ‘High knees 2×20’, ‘Jump rope 3 min’],
exercises: [
{ name: ‘Box Jump’, sets: ‘4×5’, note: ‘Max height, reset each rep’ },
{ name: ‘Front Squat’, sets: ‘3×6’, note: ‘Moderate weight, fast up’ },
{ name: ‘Trap Bar Deadlift’, sets: ‘3×5’, note: ‘Explosive’ },
{ name: ‘Lateral Bounds’, sets: ‘3×8 each’ },
{ name: ‘Step-up’, sets: ‘3×10 each’ },
{ name: ‘Depth Drop’, sets: ‘3×5’ },
{ name: ‘Calf Jump’, sets: ‘3×15’, note: ‘Ankle stiffness’ },
{ name: ‘Pallof Press’, sets: ‘3×12 each’ },
]
}
};

const WORKOUT_DAY_MAP = { 2: ‘tue’, 4: ‘thu’, 6: ‘sat’, 0: ‘sun’ }; // JS getDay()

function todayWorkout() {
const dow = new Date().getDay();
return WORKOUT_DAY_MAP[dow] || null;
}

// ═══════════════════════════════════════════════════════
// CONTENT PILLARS
// ═══════════════════════════════════════════════════════
const PILLARS = [
{ id: ‘faith’, label: ‘Faith’, color: ‘pu’, icon: ‘✦’ },
{ id: ‘fitness’, label: ‘Fitness’, color: ‘gr’, icon: ‘◈’ },
{ id: ‘parenting’, label: ‘Parenting’, color: ‘bl’, icon: ‘◉’ },
{ id: ‘marriage’, label: ‘Marriage’, color: ‘re’, icon: ‘♡’ },
{ id: ‘entrepreneurship’, label: ‘Entrepreneurship’, color: ‘or’, icon: ‘◆’ },
];

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
let currentPage = ‘home’;
let pageState = {};

function goPage(page, state = {}) {
currentPage = page;
pageState = state;
document.querySelectorAll(’.nav-btn’).forEach(b => b.classList.toggle(‘active’, b.dataset.page === page));
render();
document.getElementById(‘screen’).scrollTop = 0;
}

function render() {
const scr = document.getElementById(‘screen’);
scr.innerHTML = ‘’;

}

function renderHome(scr) {

const dayName = dt.toLocaleDateString(‘en-CA’, { weekday: ‘long’ });
const dateStr = dt.toLocaleDateString(‘en-CA’, { month: ‘long’, day: ‘numeric’ });

// gather due reminders → inject as tasks
const due = dueReminders();
due.forEach(r => {
const tasks = DB.get(‘todos’, []);
const already = tasks.find(x => x.reminderId === r.id);
if (!already) {
DB.push(‘todos’, { id: uid(), text: r.text, date: t, done: false, area: r.area || ‘General’, reminderId: r.id });
}
});

// habits
const habits = [
{ id: ‘podcast’, label: ‘Podcast’ },
{ id: ‘toam’, label: ‘TOAM Message’ },
{ id: ‘reading’, label: ‘15-min Reading’ },
];
const habitLog = DB.get(‘habit_log’, {});
const wdays = weekDays();
const DAY_LBLS = [‘M’,‘T’,‘W’,‘T’,‘F’,‘S’,‘S’];

// todos today
let todos = DB.get(‘todos’, []);
// auto-roll: move past-due incomplete todos to today
todos = todos.map(td2 => {
if (!td2.done && td2.date < t) return { …td2, date: t, rolledOver: true };
return td2;
});
DB.set(‘todos’, todos);
const todayTodos = todos.filter(x => x.date === t);

// workout today
const wkDay = todayWorkout();
const wkData = wkDay ? WORKOUTS[wkDay] : null;

let html = `<div class="pg-head"><div class="pg-title">${dayName}</div><div class="pg-sub">${dateStr}</div></div>`;

// ── HABITS
html += `<div class="sec"><div class="sec-lbl">Daily Habits</div><div class="card">`;
habits.forEach(h => {
const key = `${t}_${h.id}`;
const done = !!habitLog[key];
html += `<div class="habit-row"> <div class="habit-name">${h.label}</div> <div style="display:flex;align-items:center;gap:8px"> <div class="habit-days">`;
wdays.forEach((wd, i) => {
const wk = `${wd}_${h.id}`;
const wdone = !!habitLog[wk];
const isT = wd === t;
html += `<div class="hday${wdone?' done':''}${isT?' today':''}">${DAY_LBLS[i]}</div>`;
});
html += `</div> <button class="btn btn-sm ${done?'btn-or':'btn-ghost'}" onclick="toggleHabit('${h.id}','${t}')">${done?'✓':'Log'}</button> </div></div>`;
});
html += `</div></div>`;

// ── TODAY’S WORKOUT QUICK-VIEW
if (wkData) {
html += `<div class="sec"><div class="sec-lbl">Today's Session</div> <div class="card" style="cursor:pointer" onclick="goPage('fitness',{tab:'log'})"> <div class="card-row"><span class="card-title">${wkData.label}</span><span class="pill pill-gr">${wkData.tag}</span></div> <div class="card-sub" style="margin-top:6px">${wkData.exercises.length} exercises · Tap to log</div> </div></div>`;
}

// ── TO-DO LIST
html += `<div class="sec"><div style="display:flex;align-items:center;justify-content:space-between"><div class="sec-lbl">Tasks Today</div><button class="btn btn-sm btn-ghost" onclick="openAddTodo()">+ Add</button></div>`;
if (todayTodos.length === 0) {
html += `<div class="empty"><div class="empty-icon">✓</div>Nothing on the list</div>`;
} else {
html += `<div class="card">`;
todayTodos.forEach(td2 => {
html += `<div class="todo-item"> <div class="todo-check${td2.done?' done':''}" onclick="toggleTodo('${td2.id}')">${td2.done?'✓':''}</div> <div style="flex:1"> <div class="todo-text${td2.done?' done':''}">${td2.text}</div> <div class="todo-meta">${td2.area}${td2.rolledOver?' · rolled over':''}</div> </div> <button class="todo-del" onclick="deleteTodo('${td2.id}')">×</button> </div>`;
});
html += `</div>`;
}
html += `</div>`;

// ── DUE REMINDERS
if (due.length > 0) {
html += `<div class="sec"><div class="sec-lbl">Reminders Due</div>`;
due.forEach(r => {
html += `<div class="card" style="border-color:var(--yb)"> <div class="card-row"> <div><div class="card-title">${r.text}</div><div class="card-sub">${r.area} · ${fmtDate(r.date)}</div></div> <button class="btn btn-sm btn-ghost" onclick="dismissReminder('${r.id}');render()">Done</button> </div></div>`;
});
html += `</div>`;
}

scr.innerHTML = html;
}

function toggleHabit(id, date) {
const log = DB.get(‘habit_log’, {});
const key = `${date}_${id}`;
if (log[key]) delete log[key]; else log[key] = true;
DB.set(‘habit_log’, log);
render();
}

function toggleTodo(id) {
const todos = DB.get(‘todos’, []);
const i = todos.findIndex(x => x.id === id);
if (i >= 0) { todos[i].done = !todos[i].done; DB.set(‘todos’, todos); }
render();
}

function deleteTodo(id) { DB.remove(‘todos’, id); render(); }

function openAddTodo() {
openModal(`<div class="modal-title">Add Task</div> <div class="field"><label>Task</label><input class="inp" id="td-text" placeholder="What needs to happen?"></div> <div class="field"><label>Area</label> <select class="inp" id="td-area"> <option>General</option><option>Faith</option><option>Fitness</option> <option>Parenting</option><option>Marriage</option><option>AKB</option><option>Content</option> </select> </div> <div class="field"><label>Date</label><input class="inp" type="date" id="td-date" value="${today()}"></div> <button class="btn btn-or btn-full" onclick="saveTodo()">Add Task</button>`);
}

function saveTodo() {
const text = document.getElementById(‘td-text’).value.trim();
if (!text) return;
DB.push(‘todos’, { id: uid(), text, area: document.getElementById(‘td-area’).value, date: document.getElementById(‘td-date’).value, done: false });
closeModal();
}
</script>

function calcFaithStreak() {
  const entries = DB.get('faith_log', []).map(e=>e.date).sort((a,b)=>b.localeCompare(a));
  let streak = 0, cursor = new Date(today()+'T00:00:00');
  for (let i=0;i<365;i++) {
    const k = cursor.toISOString().split('T')[0];
    if (entries.includes(k)) { streak++; cursor.setDate(cursor.getDate()-1); }
    else break;
  }
  return streak;
}

DB.set(‘faith_log’, log);
closeModal();
}

  else if (sub==='customers') html += renderCustomers();

  else if (sub==='customers') scr.innerHTML += `<button class="fab" onclick="openAddCustomer()">+</button>`;
}

// ─── PIPELINE ───────────────────────────────────────────
function renderPipeline() {
  const ptab = pageState.ptab || 'contacts';
  let html = `<div class="tab-bar" style="padding-top:0">
    <button class="tab-btn ${ptab==='contacts'?'active':''}" onclick="goPage('biz',{sub:'pipeline',ptab:'contacts'})">Contacts</button>

  </div>`;

  if (ptab==='contacts') {
    const contacts = DB.get('pipeline_contacts',[]);
    const filter = pageState.stageFilter || 'all';
    const stages = [{id:'all',label:'All'},{id:'?',label:'? Maybe'},{id:'✓',label:'✓ Yes'},{id:'✗',label:'✗ No'}];
    html += `<div class="sec"><div style="display:flex;gap:4px;margin-bottom:12px">`;
    stages.forEach(s=>{
      html+=`<button class="btn btn-sm ${filter===s.id?'btn-or':'btn-ghost'}" onclick="goPage('biz',{sub:'pipeline',ptab:'contacts',stageFilter:'${s.id}'})">${s.label}</button>`;
    });
    html+=`</div>`;
    const filtered = filter==='all' ? contacts : contacts.filter(c=>c.stage===filter);
    if (filtered.length===0) html+=`<div class="empty"><div class="empty-icon">◆</div>No contacts yet</div>`;
    filtered.forEach(c=>{
      const stageColor = c.stage==='✓'?'gr':c.stage==='✗'?'re':'ye';

          <span class="pill pill-${stageColor}">${c.stage||'?'}</span>
        </div>
        <div class="contact-footer">
          <span class="pill pill-gray">${c.platform||'IG'}</span>
          ${c.dropSent?`<span class="pill pill-bl">Drop Sent</span>`:''}
          ${c.reminder?`<div class="reminder-dot"></div><span style="font-size:10px;color:var(--ye)">${fmtDate(c.reminder)}</span>`:''}
        </div>
        ${c.notes?`<div class="contact-note">${c.notes.slice(0,80)}${c.notes.length>80?'…':''}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  } else if (ptab==='daily') {
    const t = today();
    const dayLog = DB.get(`pip_day_${t}`,{ig:0,bb:0,dtm:0});
    html+=`<div class="sec"><div class="sec-lbl">Today's Activity</div><div class="stat-grid">
      <div class="stat-card"><div class="stat-val" style="color:var(--or)">${dayLog.ig}</div><div class="stat-lbl">IG Convos</div>
        <div class="stat-ctrls"><button class="stat-btn" onclick="pipLog('ig',-1)">−</button><button class="stat-btn" onclick="pipLog('ig',1)">+</button></div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--bl)">${dayLog.bb}</div><div class="stat-lbl">Bumble Biz</div>
        <div class="stat-ctrls"><button class="stat-btn" onclick="pipLog('bb',-1)">−</button><button class="stat-btn" onclick="pipLog('bb',1)">+</button></div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--gr)">${dayLog.dtm}</div><div class="stat-lbl">Drop Msgs</div>
        <div class="stat-ctrls"><button class="stat-btn" onclick="pipLog('dtm',-1)">−</button><button class="stat-btn" onclick="pipLog('dtm',1)">+</button></div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--pu)">${dayLog.ig+dayLog.bb}</div><div class="stat-lbl">Total Convos</div></div>
    </div></div>`;
  } else {
    html += renderRemindersTab('Pipeline');
  }
  return html;
}

function pipLog(field, delta) {
  const t = today();
  const key = `pip_day_${t}`;
  const d = DB.get(key,{ig:0,bb:0,dtm:0});
  d[field] = Math.max(0, (d[field]||0)+delta);
  DB.set(key,d); render();
}

function openContactDetail(id) {

function updateContact(id) {

    const pillarFilter = pageState.pillarFilter || 'all';
    html += `<div class="sec"><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">
      <button class="btn btn-sm ${pillarFilter==='all'?'btn-or':'btn-ghost'}" onclick="goPage('biz',{sub:'content',ctab:'calendar',pillarFilter:'all'})">All</button>`;
    PILLARS.forEach(p=>{
      html+=`<button class="btn btn-sm ${pillarFilter===p.id?'btn-or':'btn-ghost'}" onclick="goPage('biz',{sub:'content',ctab:'calendar',pillarFilter:'${p.id}'})">${p.icon} ${p.label}</button>`;
    });
    html+=`</div>`;
    const filtered = pillarFilter==='all' ? posts : posts.filter(p=>p.pillar===pillarFilter);
    const sorted = [...filtered].sort((a,b)=>a.date<b.date?-1:1);
    if (sorted.length===0) html+=`<div class="empty"><div class="empty-icon">◆</div>No posts scheduled yet</div>`;
    sorted.forEach(p=>{
      const pl = PILLARS.find(x=>x.id===p.pillar);
      const statusColor = p.status==='posted'?'gr':p.status==='filmed'?'bl':p.status==='scripted'?'pu':'gray';
      html+=`<div class="contact-card" onclick="openEditPost('${p.id}')">
        <div class="contact-header">
          <div><div class="card-title">${p.title||'Untitled Post'}</div><div class="card-sub">${fmtDate(p.date)}</div></div>
          <span class="pill pill-${statusColor}">${p.status||'Idea'}</span>
        </div>
        <div class="contact-footer">
          ${pl?`<span class="pill pill-${pl.color}">${pl.icon} ${pl.label}</span>`:''}
          ${p.format?`<span class="pill pill-gray">${p.format}</span>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
    // FAB for add post handled below
    html+=`<div style="height:70px"></div>`;
    // inject FAB via setTimeout workaround — we'll add it inline
    setTimeout(()=>{
      const scr2 = document.getElementById('screen');
      if (scr2 && !document.getElementById('content-fab')) {
        const fab = document.createElement('button');
        fab.className='fab'; fab.id='content-fab'; fab.textContent='+'; fab.onclick=openAddPost;
        scr2.appendChild(fab);
      }
    },10);
  } else if (ctab==='filming') {
    const filmDays = DB.get('filming_schedule',[]);
    html+=`<div class="sec"><div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-sm btn-or" onclick="openAddFilmDay()">+ Day</button></div>`;
    if (filmDays.length===0) {
      html+=`<div class="empty"><div class="empty-icon">◈</div>No filming days scheduled</div>`;
    }
    [...filmDays].sort((a,b)=>a.date<b.date?-1:1).forEach(d=>{
      html+=`<div class="contact-card" onclick="openEditFilmDay('${d.id}')">
        <div class="contact-header"><div class="card-title">${fmtDate(d.date)}</div><span class="pill pill-${d.type==='Edit'?'bl':d.type==='Post'?'gr':'or'}">${d.type||'Film'}</span></div>
        ${d.notes?`<div class="contact-note">${d.notes}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  } else if (ctab==='scripting') {
    const scripts = DB.get('content_scripts',[]);
    html+=`<div class="sec"><div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-sm btn-or" onclick="openAddScript()">+ Script</button></div>`;
    if (scripts.length===0) html+=`<div class="empty"><div class="empty-icon">✦</div>No scripts yet</div>`;
    scripts.slice().reverse().forEach(s=>{
      const pl = PILLARS.find(x=>x.id===s.pillar);
      html+=`<div class="contact-card" onclick="openViewScript('${s.id}')">
        <div class="contact-header"><div class="card-title">${s.title||'Untitled'}</div><span class="pill pill-${s.status==='done'?'gr':'gray'}">${s.status||'Draft'}</span></div>
        <div class="contact-footer">${pl?`<span class="pill pill-${pl.color}">${pl.icon} ${pl.label}</span>`:''}</div>
      </div>`;
    });
    html+=`</div>`;
  } else if (ctab==='ideas') {
    const ideas = DB.get('content_ideas',[]);
    html+=`<div class="sec"><div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn btn-sm btn-or" onclick="openAddIdea()">+ Idea</button></div>`;
    if (ideas.length===0) html+=`<div class="empty"><div class="empty-icon">◉</div>No ideas yet</div>`;
    ideas.slice().reverse().forEach(idea=>{
      const pl = PILLARS.find(x=>x.id===idea.pillar);
      html+=`<div class="contact-card" onclick="openEditIdea('${idea.id}')">
        <div class="contact-header"><div class="card-title">${idea.text}</div>${idea.used?`<span class="pill pill-gr">Used</span>`:''}</div>
        <div class="contact-footer">${pl?`<span class="pill pill-${pl.color}">${pl.icon} ${pl.label}</span>`:''}</div>
      </div>`;
    });
    html+=`</div>`;
  } else if (ctab==='review') {
    const reviews = DB.get('content_reviews',[]).slice().reverse();
    html+=`<div class="sec">
      <div class="card" style="border-color:var(--ob);margin-bottom:12px">
        <div class="card-title" style="color:var(--or)">Weekly Review Prompt</div>
        <div style="font-size:12px;color:var(--t2);margin-top:8px;line-height:1.7">
          1. What content performed best this week?<br>
          2. Which pillar got the least coverage?<br>
          3. What ideas came up you haven't scripted?<br>
          4. Did you hit your filming/posting schedule?<br>
          5. What's your priority for next week?
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="sec-lbl">Review Log</div>
        <button class="btn btn-sm btn-or" onclick="openAddReview()">+ Review</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:11px;color:var(--t2)">Set weekly reminder</span>
        <button class="btn btn-sm btn-ghost" onclick="openAddReminderFor('Content','review','Weekly Review')">+ Reminder</button>
      </div>`;
    if (reviews.length===0) html+=`<div class="empty" style="padding:16px">No reviews yet</div>`;
    reviews.forEach(r=>{
      html+=`<div class="log-entry"><div class="log-date">${fmtDate(r.date)}</div><div class="log-text">${r.notes}</div></div>`;
    });
    html+=`</div>`;
  }

  return html;
}

function openAddPost() {
  openModal(`
    <div class="modal-title">Schedule Post</div>
    <div class="field"><label>Title / Hook</label><input class="inp" id="po-title" placeholder="What's the post about?"></div>
    <div class="field"><label>Date</label><input class="inp" type="date" id="po-date" value="${today()}"></div>
    <div class="field"><label>Pillar</label><select class="inp" id="po-pillar">
      ${PILLARS.map(p=>`<option value="${p.id}">${p.icon} ${p.label}</option>`).join('')}
    </select></div>
    <div class="field"><label>Format</label><select class="inp" id="po-format">
      <option>Reel</option><option>Carousel</option><option>Story</option><option>Static</option>
    </select></div>
    <div class="field"><label>Status</label><select class="inp" id="po-status">
      <option value="idea">Idea</option><option value="scripted">Scripted</option><option value="filmed">Filmed</option><option value="posted">Posted</option>
    </select></div>
    <div class="field"><label>Notes</label><textarea class="inp" id="po-notes" placeholder="Script notes, b-roll, caption ideas..."></textarea></div>

```
<button class="btn btn-or btn-full" onclick="savePost()">Save</button>
```

`);
}

function savePost() {
DB.push(‘content_posts’,{id:uid(),title:document.getElementById(‘po-title’).value.trim(),date:document.getElementById(‘po-date’).value,
pillar:document.getElementById(‘po-pillar’).value,format:document.getElementById(‘po-format’).value,
status:document.getElementById(‘po-status’).value,notes:document.getElementById(‘po-notes’).value.trim()});
closeModal();
}

function openEditPost(id) {
const p = DB.get(‘content_posts’,[]).find(x=>x.id===id);
if (!p) return;
openModal(` <div class="modal-title">Edit Post</div> <div class="field"><label>Title / Hook</label><input class="inp" id="pe-title" value="${p.title||''}"></div> <div class="field"><label>Date</label><input class="inp" type="date" id="pe-date" value="${p.date||today()}"></div> <div class="field"><label>Pillar</label><select class="inp" id="pe-pillar"> ${PILLARS.map(pl=>`<option value=”${pl.id}” ${pl.id===p.pillar?‘selected’:’’}>${pl.icon} ${pl.label}</option>`).join('')} </select></div> <div class="field"><label>Format</label><select class="inp" id="pe-format"> ${['Reel','Carousel','Story','Static'].map(f=>`<option ${f===p.format?‘selected’:’’}>${f}</option>`).join('')} </select></div> <div class="field"><label>Status</label><select class="inp" id="pe-status"> ${[['idea','Idea'],['scripted','Scripted'],['filmed','Filmed'],['posted','Posted']].map(([v,l])=>`<option value=”${v}” ${v===p.status?‘selected’:’’}>${l}</option>`).join('')} </select></div> <div class="field"><label>Notes</label><textarea class="inp" id="pe-notes">${p.notes||''}</textarea></div> <div style="display:flex;gap:8px"> <button class="btn btn-or" style="flex:1" onclick="updatePost('${id}')">Save</button> <button class="btn btn-ghost btn-sm" onclick="deletePost('${id}')">Delete</button> </div> `);
}

function updatePost(id) {
DB.update(‘content_posts’,id,{title:document.getElementById(‘pe-title’).value.trim(),date:document.getElementById(‘pe-date’).value,
pillar:document.getElementById(‘pe-pillar’).value,format:document.getElementById(‘pe-format’).value,
status:document.getElementById(‘pe-status’).value,notes:document.getElementById(‘pe-notes’).value.trim()});
closeModal();
}
function deletePost(id) { if(confirm(‘Delete post?’)){DB.remove(‘content_posts’,id);closeModal();} }

function openAddFilmDay() {
openModal(`<div class="modal-title">Filming Day</div> <div class="field"><label>Date</label><input class="inp" type="date" id="fd-date" value="${today()}"></div> <div class="field"><label>Type</label><select class="inp" id="fd-type"><option>Film</option><option>Edit</option><option>Post</option></select></div> <div class="field"><label>Notes</label><textarea class="inp" id="fd-notes" placeholder="What are you filming/editing?"></textarea></div> <button class="btn btn-or btn-full" onclick="saveFilmDay()">Save</button>`);
}
function saveFilmDay() {
DB.push(‘filming_schedule’,{id:uid(),date:document.getElementById(‘fd-date’).value,type:document.getElementById(‘fd-type’).value,notes:document.getElementById(‘fd-notes’).value.trim()});
closeModal();
}
function openEditFilmDay(id) {
const d = DB.get(‘filming_schedule’,[]).find(x=>x.id===id);
if (!d) return;
openModal(` <div class="modal-title">Edit Day</div> <div class="field"><label>Date</label><input class="inp" type="date" id="fd2-date" value="${d.date}"></div> <div class="field"><label>Type</label><select class="inp" id="fd2-type"> ${['Film','Edit','Post'].map(t=>`<option ${t===d.type?‘selected’:’’}>${t}</option>`).join('')} </select></div> <div class="field"><label>Notes</label><textarea class="inp" id="fd2-notes">${d.notes||''}</textarea></div> <div style="display:flex;gap:8px"> <button class="btn btn-or" style="flex:1" onclick="updateFilmDay('${id}')">Save</button> <button class="btn btn-ghost btn-sm" onclick="deleteFilmDay('${id}')">Delete</button> </div> `);
}
function updateFilmDay(id){DB.update(‘filming_schedule’,id,{date:document.getElementById(‘fd2-date’).value,type:document.getElementById(‘fd2-type’).value,notes:document.getElementById(‘fd2-notes’).value.trim()});closeModal();}
function deleteFilmDay(id){if(confirm(‘Delete?’)){DB.remove(‘filming_schedule’,id);closeModal();}}

function openAddScript() {
openModal(` <div class="modal-title">New Script</div> <div class="field"><label>Title</label><input class="inp" id="sc-title" placeholder="What's the reel about?"></div> <div class="field"><label>Pillar</label><select class="inp" id="sc-pillar"> ${PILLARS.map(p=>`<option value="${p.id}">${p.icon} ${p.label}</option>`).join('')} </select></div> <div class="field"><label>Hook</label><input class="inp" id="sc-hook" placeholder="Opening line..."></div> <div class="field"><label>Script / Outline</label><textarea class="inp" id="sc-body" style="min-height:120px" placeholder="Write it out or outline it..."></textarea></div> <div class="field"><label>Status</label><select class="inp" id="sc-status"><option value="draft">Draft</option><option value="done">Ready to Film</option></select></div> <button class="btn btn-or btn-full" onclick="saveScript()">Save Script</button> `);
}
function saveScript(){
DB.push(‘content_scripts’,{id:uid(),title:document.getElementById(‘sc-title’).value.trim(),pillar:document.getElementById(‘sc-pillar’).value,
hook:document.getElementById(‘sc-hook’).value.trim(),body:document.getElementById(‘sc-body’).value.trim(),status:document.getElementById(‘sc-status’).value});
closeModal();
}
function openViewScript(id){
const s=DB.get(‘content_scripts’,[]).find(x=>x.id===id);
if(!s)return;
const pl=PILLARS.find(x=>x.id===s.pillar);
openModal(` <div class="modal-title">${s.title||'Script'}</div> ${pl?`<div style="margin-bottom:12px"><span class="pill pill-${pl.color}">${pl.icon} ${pl.label}</span></div>`:''} ${s.hook?`<div class="field"><label>Hook</label><div class="card"><div class="log-text">${s.hook}</div></div></div>`:''} <div class="field"><label>Script</label><div class="card"><div class="log-text" style="white-space:pre-wrap">${s.body||'No script yet.'}</div></div></div> <div style="display:flex;gap:8px"> <button class="btn btn-${s.status==='done'?'or':'ghost'} btn-sm" onclick="toggleScriptStatus('${s.id}')">${s.status==='done'?'✓ Ready':'Mark Ready'}</button> <button class="btn btn-ghost btn-sm" onclick="deleteScript('${s.id}')">Delete</button> </div> `);
}
function toggleScriptStatus(id){const s=DB.get(‘content_scripts’,[]).find(x=>x.id===id);DB.update(‘content_scripts’,id,{status:s?.status===‘done’?‘draft’:‘done’});openViewScript(id);}
function deleteScript(id){if(confirm(‘Delete script?’)){DB.remove(‘content_scripts’,id);closeModal();}}

function openAddIdea(){
openModal(` <div class="modal-title">Content Idea</div> <div class="field"><label>Idea</label><input class="inp" id="id-text" placeholder="What's the concept?"></div> <div class="field"><label>Pillar</label><select class="inp" id="id-pillar"> ${PILLARS.map(p=>`<option value="${p.id}">${p.icon} ${p.label}</option>`).join('')} </select></div> <button class="btn btn-or btn-full" onclick="saveIdea()">Save Idea</button> `);
}
function saveIdea(){DB.push(‘content_ideas’,{id:uid(),text:document.getElementById(‘id-text’).value.trim(),pillar:document.getElementById(‘id-pillar’).value,used:false});closeModal();}
function openEditIdea(id){
const idea=DB.get(‘content_ideas’,[]).find(x=>x.id===id);
if(!idea)return;
openModal(`<div class="modal-title">Edit Idea</div> <div class="field"><label>Idea</label><input class="inp" id="ie-text" value="${idea.text}"></div> <div style="display:flex;gap:8px;margin-top:8px"> <button class="btn btn-${idea.used?'or':'ghost'} btn-sm" onclick="toggleIdeaUsed('${id}')">${idea.used?'✓ Used':'Mark Used'}</button> <button class="btn btn-ghost btn-sm" onclick="deleteIdea('${id}')">Delete</button> <button class="btn btn-or" style="flex:1;margin-left:auto" onclick="updateIdea('${id}')">Save</button> </div>`);
}
function updateIdea(id){DB.update(‘content_ideas’,id,{text:document.getElementById(‘ie-text’).value.trim()});closeModal();}
function toggleIdeaUsed(id){const idea=DB.get(‘content_ideas’,[]).find(x=>x.id===id);DB.update(‘content_ideas’,id,{used:!idea?.used});openEditIdea(id);}
function deleteIdea(id){if(confirm(‘Delete idea?’)){DB.remove(‘content_ideas’,id);closeModal();}}

function openAddReview(){
openModal(`<div class="modal-title">Weekly Review</div> <div class="field"><label>Week of</label><input class="inp" type="date" id="rv-date" value="${today()}"></div> <div class="field"><label>Notes</label><textarea class="inp" id="rv-notes" style="min-height:120px" placeholder="Best performers, gaps, priorities, ideas..."></textarea></div> <button class="btn btn-or btn-full" onclick="saveReview()">Save Review</button>`);
}
function saveReview(){DB.push(‘content_reviews’,{id:uid(),date:document.getElementById(‘rv-date’).value,notes:document.getElementById(‘rv-notes’).value.trim()});closeModal();}

// ═══════════════════════════════════════════════════════
// REMINDERS TAB (reusable)
// ═══════════════════════════════════════════════════════
function renderRemindersTab(area) {
const all = getAllReminders().filter(r=>r.area===area&&!r.dismissed);
let html = `<div class="sec"><div style="display:flex;justify-content:flex-end;margin-bottom:8px">
<button class="btn btn-sm btn-or" onclick="openAddReminderFor('${area}','','')">+ Reminder</button>

  </div>`;
  if (all.length===0) html+=`<div class="empty"><div class="empty-icon" style="font-size:20px">⏰</div>No reminders set</div>`;
  all.forEach(r=>{
    const overdue = r.date < today();
    html+=`<div class="card" style="border-color:${overdue?'var(--rb)':'var(--yb)'}">
      <div class="card-row">
        <div><div class="card-title">${r.text}</div><div class="card-sub">${fmtDate(r.date)}${overdue?' · Overdue':''}</div></div>
        <button class="btn btn-sm btn-ghost" onclick="deleteReminder('${r.id}');render()">×</button>
      </div></div>`;
  });
  html+=`</div>`;
  return html;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
